# https://taskfile.dev

version: '3'

includes:
  attraction:
    taskfile: trip-attraction-service/Taskfile.yaml
    dir: trip-attraction-service
    internal: true

  chat:
    taskfile: trip-chat-service/Taskfile.yaml
    dir: trip-chat-service
    internal: true


  hotel:
    taskfile: trip-hotel-service/Taskfile.yaml
    dir: trip-hotel-service
    internal: true

  inventory:
    taskfile: trip-inventory-service/Taskfile.yaml
    dir: trip-inventory-service
    internal: true

  itinerary-planner:
    taskfile: trip-itinerary-planner/Taskfile.yaml
    dir: trip-itinerary-planner
    internal: true

  itinerary:
    taskfile: trip-itinerary-service/Taskfile.yaml
    dir: trip-itinerary-service
    internal: true

  next-frontend:
    taskfile: trip-next-frontend/Taskfile.yaml
    dir: trip-next-frontend
    internal: true


  order-assistant:
    taskfile: trip-order-assistant/Taskfile.yaml
    dir: trip-order-assistant
    internal: true

  order:
    taskfile: trip-order-service/Taskfile.yaml
    dir: trip-order-service
    internal: true
  

  product:
    taskfile: trip-product-service/Taskfile.yaml
    dir: trip-product-service
    internal: true


  user:
    taskfile: trip-user-service/Taskfile.yaml
    dir: trip-user-service
    internal: true

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all
    silent: true
  
  buf:
    desc: Run buf format and buf lint
    dir: contracts
    cmds:
      - buf format --write
      - buf lint

  gen-proto:
    desc: Generate protobuf and gRPC codes
    cmds:
      - task: attraction:gen-proto
      - task: chat:gen-proto
      - task: hotel:gen-proto
      - task: inventory:gen-proto
      - task: itinerary-planner:gen-proto
      - task: itinerary:gen-proto
      - task: next-frontend:gen-proto
      - task: order-assistant:gen-proto
      - task: order:gen-proto
      - task: product:gen-proto
      - task: user:gen-proto

  build:
    desc: Build Docker images for all services
    cmds:
      - task: attraction:build
      - task: chat:build
      - task: hotel:build
      - task: inventory:build
      - task: itinerary-planner:build
      - task: itinerary:build
      - task: next-frontend:build
      - task: order-assistant:build
      - task: order:build
      - task: product:build
      - task: user:build
  
  build-aliyun:
    desc: Build Docker images for all services with Aliyun mirror
    cmds:
      - task: attraction:build-aliyun
      - task: chat:build-aliyun
      - task: hotel:build-aliyun
      - task: inventory:build-aliyun
      - task: itinerary-planner:build-aliyun
      - task: itinerary:build-aliyun
      - task: next-frontend:build-aliyun
      - task: order-assistant:build-aliyun
      - task: order:build-aliyun
      - task: product:build-aliyun
      - task: user:build-aliyun

  start:
    desc: Start all services by Docker Compose
    cmds:
      - docker compose up --force-recreate --remove-orphans --detach

  stop:
    desc: Stop all services by Docker Compose
    cmds:
      - docker compose down --remove-orphans --volumes
