networks:
  default:
    name: tripsphere
    driver: bridge

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

configs:
  qdrant_config:
    content: |
      log_level: INFO

services:

  # ─── Gateway & Service Discovery ────────────────────────────────────────────

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: nacos
    logging: *logging
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN}
    ports:
      - "18080:8080" # Console
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v3/console/health/readiness" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:2.1.11
    container_name: higress
    logging: *logging
    environment:
      - O11Y=on
    ports:
      - "8001:8001" # Console
      - "28080:8080" # HTTP gateway
      - "8443:8443" # HTTPS gateway
    volumes:
      - ./volumes/higress:/data
    restart: unless-stopped

  # ─── Databases & Storage ─────────────────────────────────────────────────────

  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi8
    container_name: mongodb
    logging: *logging
    user: root
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - ./volumes/mongodb:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16.13-alpine
    container_name: postgres
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USERNAME}" ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.4
    container_name: redis
    logging: *logging
    volumes:
      - ./volumes/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: qdrant
    logging: *logging
    ports:
      - "6333:6333"
      - "6334:6334"
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    restart: unless-stopped

  # ─── Observability ────────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.144.0
    container_name: otel-collector
    logging: *logging
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.8.3
    container_name: tempo
    logging: *logging
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
      - ./volumes/tempo:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP API
      - "4317" # OTLP gRPC (internal)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1
    container_name: grafana
    logging: *logging
    user: root
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      tempo:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ─── Application Services ─────────────────────────────────────────────────────

  trip-attraction-service:
    build:
      context: trip-attraction-service
      dockerfile: Dockerfile
    image: tripsphere/trip-attraction-service:latest
    container_name: trip-attraction-service
    logging: *logging
    ports:
      - "24213:24213" # HTTP
      - "50053:50053" # gRPC
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
      - SPRING_DATA_MONGODB_DATABASE=attraction_db
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
    depends_on:
      nacos:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  trip-chat-service:
    build:
      context: trip-chat-service
      dockerfile: Dockerfile
    image: tripsphere/trip-chat-service:latest
    container_name: trip-chat-service
    logging: *logging
    ports:
      - "24210:24210"
    environment:
      - NACOS_SERVER_ADDRESS=${NACOS_HOST}:${NACOS_PORT}
      - QDRANT_URL=http://${QDRANT_HOST}:${QDRANT_PORT}
      - MONGO_URI=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=http://${HIGRESS_HOST}:${HIGRESS_HTTP_PORT}/v1
    depends_on:
      nacos:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      higress:
        condition: service_started
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:24210/api/v1/health').read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  trip-hotel-service:
    build:
      context: trip-hotel-service
      dockerfile: Dockerfile
    image: tripsphere/trip-hotel-service:latest
    container_name: trip-hotel-service
    logging: *logging
    ports:
      - "50054:50054" # gRPC
      - "24214:24214" # HTTP
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
      - SPRING_DATA_MONGODB_DATABASE=hotel_db
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
    depends_on:
      nacos:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  trip-inventory-service:
    build:
      context: trip-inventory-service
      dockerfile: Dockerfile
    image: tripsphere/trip-inventory-service:latest
    container_name: trip-inventory-service
    logging: *logging
    ports:
      - "24221:24221" # HTTP
      - "50061:50061" # gRPC
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/inventory_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  trip-itinerary-planner:
    build:
      context: trip-itinerary-planner
      dockerfile: Dockerfile
    image: tripsphere/trip-itinerary-planner:latest
    container_name: trip-itinerary-planner
    logging: *logging
    ports:
      - "24215:24215"
    environment:
      - NACOS_SERVER_ADDRESS=${NACOS_HOST}:${NACOS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=http://${HIGRESS_HOST}:${HIGRESS_HTTP_PORT}/v1
    depends_on:
      nacos:
        condition: service_healthy
      higress:
        condition: service_started
    restart: unless-stopped

  trip-itinerary-service:
    build:
      context: trip-itinerary-service
      dockerfile: Dockerfile
    image: tripsphere/trip-itinerary-service:latest
    container_name: trip-itinerary-service
    logging: *logging
    ports:
      - "24219:24219" # HTTP
      - "50052:50052" # gRPC
    environment:
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
      - SPRING_DATA_MONGODB_DATABASE=itinerary_db
    depends_on:
      nacos:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  trip-order-assistant:
    build:
      context: trip-order-assistant
      dockerfile: Dockerfile
    image: tripsphere/trip-order-assistant:latest
    container_name: trip-order-assistant
    logging: *logging
    ports:
      - "24211:24211"  # HTTP
    environment:
      - NACOS_SERVER_ADDRESS=${NACOS_HOST}:${NACOS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=http://${HIGRESS_HOST}:${HIGRESS_HTTP_PORT}/v1
    depends_on:
      nacos:
        condition: service_healthy
      higress:
        condition: service_started
    restart: unless-stopped

  trip-next-frontend:
    build:
      context: trip-next-frontend
      dockerfile: Dockerfile
    image: tripsphere/trip-next-frontend:latest
    container_name: trip-next-frontend
    logging: *logging
    ports:
      - "3000:3000"
    environment:
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - COPILOT_DEFAULT_AGENT_URL=http://trip-chat-service:24210/
      - COPILOT_ITINERARY_PLANNER_URL=http://trip-itinerary-planner:24215/
      - ATTRACTION_SERVICE_ADDR=trip-attraction-service:50053
      - HOTEL_SERVICE_ADDR=trip-hotel-service:50054
      - INVENTORY_SERVICE_ADDR=trip-inventory-service:50061
      - ITINERARY_SERVICE_ADDR=trip-itinerary-service:50052
      - ORDER_SERVICE_ADDR=trip-order-service:50062
      - PRODUCT_SERVICE_ADDR=trip-product-service:50060
    depends_on:
      trip-chat-service:
        condition: service_healthy
      trip-user-service:
        condition: service_started
      trip-hotel-service:
        condition: service_started
      trip-product-service:
        condition: service_started
    restart: unless-stopped

  trip-order-service:
    build:
      context: trip-order-service
      dockerfile: Dockerfile
    image: tripsphere/trip-order-service:latest
    container_name: trip-order-service
    logging: *logging
    ports:
      - "24222:24222" # HTTP
      - "50062:50062" # gRPC
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/order_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  trip-product-service:
    build:
      context: trip-product-service
      dockerfile: Dockerfile
    image: tripsphere/trip-product-service:latest
    container_name: trip-product-service
    logging: *logging
    ports:
      - "24220:24220" # HTTP
      - "50060:50060" # gRPC
    environment:
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}
      - SPRING_DATA_MONGODB_DATABASE=product_db
    depends_on:
      nacos:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  trip-user-service:
    build:
      context: trip-user-service
      dockerfile: Dockerfile
    image: tripsphere/trip-user-service:latest
    container_name: trip-user-service
    logging: *logging
    ports:
      - "50056:50056" # gRPC
      - "24217:24217" # HTTP
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/user_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_CLOUD_NACOS_SERVER_ADDR=${NACOS_HOST}:${NACOS_PORT}
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
