# Kubernetes Deployment Taskfile
# https://taskfile.dev

version: '3'

vars:
  NAMESPACE: tripsphere
  KUBECONFIG: '{{.KUBECONFIG | default "~/.kube/config"}}'
  KUBECTL: kubectl --kubeconfig={{.KUBECONFIG}}
  HELM: helm --kubeconfig={{.KUBECONFIG}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  # =============================================================================
  # Setup and Initialization
  # =============================================================================
  
  init:
    desc: Initialize Kubernetes deployment (create namespace and secrets)
    cmds:
      - echo "Initializing Kubernetes deployment..."
      - "{{.KUBECTL}} apply -f manifests/00-namespace.yaml"
      - echo "Creating secrets from example file..."
      - echo "Please copy manifests/02-secrets.yaml.example to manifests/02-secrets.yaml and configure actual values"
      - test -f manifests/02-secrets.yaml || cp manifests/02-secrets.yaml.example manifests/02-secrets.yaml
      - echo "Applying ConfigMap..."
      - "{{.KUBECTL}} apply -f manifests/01-configmap.yaml"
      - echo "Initialization complete. Please update manifests/02-secrets.yaml with actual credentials before deploying."

  add-helm-repos:
    desc: Add all required Helm repositories
    cmds:
      - echo "Adding Helm repositories..."
      - "{{.HELM}} repo add bitnami https://charts.bitnami.com/bitnami || true"
      - "{{.HELM}} repo add minio https://charts.min.io/ || true"
      - "{{.HELM}} repo add neo4j https://helm.neo4j.com/neo4j || true"
      - "{{.HELM}} repo add qdrant https://qdrant.github.io/qdrant-helm || true"
      - "{{.HELM}} repo add prometheus-community https://prometheus-community.github.io/helm-charts || true"
      - "{{.HELM}} repo update"
      - echo "Helm repositories added successfully"
      - echo ""
      - echo "Note':' Nacos and RocketMQ will be deployed using alternative methods (see tasks below)"
      - echo "- Nacos':' Using nacos-k8s project or kubectl manifests"
      - echo "- RocketMQ':' Using OCI registry (registry-1.docker.io/apache/rocketmq)"

  # =============================================================================
  # Middleware Deployment (Using Helm Charts)
  # =============================================================================

  deploy-middlewares:
    desc: Deploy all middlewares to Kubernetes
    cmds:
      - task: deploy-nacos
      - task: deploy-redis
      - task: deploy-mongodb
      - task: deploy-mysql
      - task: deploy-minio
      - task: deploy-qdrant
      - task: deploy-neo4j
      - task: deploy-rocketmq
      - task: deploy-higress
      - echo "All middlewares deployed. Waiting for them to be ready..."
      - task: wait-middlewares

  deploy-nacos:
    desc: Deploy Nacos (requires nacos-k8s project or manual setup)
    cmds:
      - echo "Deploying Nacos..."
      - echo "Option 1':' Using nacos-k8s project (recommended)"
      - echo "  git clone https://github.com/nacos-group/nacos-k8s.git"
      - echo "  cd nacos-k8s && kubectl create -f deploy/nacos/nacos-pvc-nfs.yaml"
      - echo ""
      - echo "Option 2':' Using kubectl manifests (to be created)"
      - echo "  kubectl apply -f manifests/middlewares/nacos.yaml"
      - echo ""
      - echo "Option 3':' Using Helm from nacos-k8s project"
      - echo "  git clone https://github.com/nacos-group/nacos-k8s.git"
      - echo "  cd nacos-k8s/helm && helm install nacos . --namespace {{.NAMESPACE}}"
      - echo ""
      - echo "Please choose one method and execute manually, or we'll create kubectl manifests"

  deploy-redis:
    desc: Deploy Redis using Helm
    cmds:
      - echo "Deploying Redis..."
      - |
        {{.HELM}} upgrade --install redis bitnami/redis \
          --namespace {{.NAMESPACE}} \
          --values helm-values/redis-values.yaml \
          --wait --timeout 5m

  deploy-mongodb:
    desc: Deploy MongoDB using Helm
    cmds:
      - echo "Deploying MongoDB..."
      - |
        {{.HELM}} upgrade --install mongodb bitnami/mongodb \
          --namespace {{.NAMESPACE}} \
          --values helm-values/mongodb-values.yaml \
          --wait --timeout 5m

  deploy-mysql:
    desc: Deploy MySQL using Helm
    cmds:
      - echo "Deploying MySQL..."
      - |
        {{.HELM}} upgrade --install mysql bitnami/mysql \
          --namespace {{.NAMESPACE}} \
          --values helm-values/mysql-values.yaml \
          --wait --timeout 5m

  deploy-minio:
    desc: Deploy MinIO using Helm
    cmds:
      - echo "Deploying MinIO..."
      - |
        {{.HELM}} upgrade --install minio minio/minio \
          --namespace {{.NAMESPACE}} \
          --values helm-values/minio-values.yaml \
          --wait --timeout 5m

  deploy-qdrant:
    desc: Deploy Qdrant using Helm
    cmds:
      - echo "Deploying Qdrant..."
      - |
        {{.HELM}} upgrade --install qdrant qdrant/qdrant \
          --namespace {{.NAMESPACE}} \
          --values helm-values/qdrant-values.yaml \
          --wait --timeout 5m

  deploy-neo4j:
    desc: Deploy Neo4j using Helm
    cmds:
      - echo "Deploying Neo4j..."
      - |
        {{.HELM}} upgrade --install neo4j neo4j/neo4j \
          --namespace {{.NAMESPACE}} \
          --values helm-values/neo4j-values.yaml \
          --wait --timeout 5m

  deploy-rocketmq:
    desc: Deploy RocketMQ using OCI Helm Chart
    cmds:
      - echo "Deploying RocketMQ..."
      - echo "Pulling RocketMQ Helm chart from OCI registry..."
      - "{{.HELM}} pull oci://registry-1.docker.io/apache/rocketmq --version 0.0.1 --untar --untardir /tmp || true"
      - echo "Installing RocketMQ..."
      - |
        {{.HELM}} upgrade --install rocketmq /tmp/rocketmq \
          --namespace {{.NAMESPACE}} \
          --values helm-values/rocketmq-values.yaml \
          --wait --timeout 10m || echo "RocketMQ installation requires manual intervention, see official docs"

  deploy-higress:
    desc: Deploy Higress using kubectl manifests
    cmds:
      - echo "Deploying Higress..."
      - echo "Higress is typically deployed as a Kubernetes Ingress Controller"
      - echo "Please refer to':' https://higress.io/docs/latest/ops/deploy-by-helm/"
      - echo "For now, we'll use kubectl manifests (to be created)"
      - echo "kubectl apply -f manifests/middlewares/higress.yaml"

  wait-middlewares:
    desc: Wait for all middleware pods to be ready
    cmds:
      - echo "Waiting for middlewares to be ready..."
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=nacos -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=mongodb -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=mysql -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=redis -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=minio -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=qdrant -n {{.NAMESPACE}} --timeout=300s || true"
      - "{{.KUBECTL}} wait --for=condition=ready pod -l app.kubernetes.io/name=neo4j -n {{.NAMESPACE}} --timeout=300s || true"
      - echo "All middlewares are ready!"

  # =============================================================================
  # Service Deployment (Using kubectl manifests)
  # =============================================================================

  deploy-services:
    desc: Deploy all TripSphere services
    cmds:
      - echo "Deploying TripSphere services..."
      - echo "Applying secrets..."
      - "{{.KUBECTL}} apply -f manifests/02-secrets.yaml"
      - echo "Deploying services..."
      - "{{.KUBECTL}} apply -f manifests/services/"
      - echo "Deploying ingress..."
      - "{{.KUBECTL}} apply -f manifests/ingress/ || true"
      - echo "Services deployed successfully"

  # =============================================================================
  # Complete Deployment
  # =============================================================================

  deploy-all:
    desc: Deploy entire TripSphere stack (middlewares + services)
    cmds:
      - task: init
      - task: add-helm-repos
      - task: deploy-middlewares
      - task: deploy-services
      - echo "Deployment complete! Run 'task verify' to check status"

  # =============================================================================
  # Verification and Status
  # =============================================================================

  verify:
    desc: Verify all pods are running
    cmds:
      - echo "Checking pod status..."
      - "{{.KUBECTL}} get pods -n {{.NAMESPACE}}"
      - echo ""
      - echo "Checking services..."
      - "{{.KUBECTL}} get svc -n {{.NAMESPACE}}"

  status:
    desc: Show status of all resources
    cmds:
      - echo "=== Namespaces ==="
      - "{{.KUBECTL}} get ns {{.NAMESPACE}}"
      - echo ""
      - echo "=== Pods ==="
      - "{{.KUBECTL}} get pods -n {{.NAMESPACE}}"
      - echo ""
      - echo "=== Services ==="
      - "{{.KUBECTL}} get svc -n {{.NAMESPACE}}"
      - echo ""
      - echo "=== PersistentVolumeClaims ==="
      - "{{.KUBECTL}} get pvc -n {{.NAMESPACE}}"
      - echo ""
      - echo "=== Ingress ==="
      - "{{.KUBECTL}} get ingress -n {{.NAMESPACE}}"

  logs:
    desc: Show logs of a specific service (use SERVICE=service-name)
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
    cmds:
      - |
        if [ -z "{{.SERVICE}}" ]; then
          echo "Please specify SERVICE=service-name"
          echo "Example: task logs SERVICE=trip-chat-service"
          exit 1
        fi
      - "{{.KUBECTL}} logs -n {{.NAMESPACE}} -l app={{.SERVICE}} --tail=100 -f"

  # =============================================================================
  # Cleanup
  # =============================================================================

  delete-services:
    desc: Delete all TripSphere services (keep middlewares)
    cmds:
      - echo "Deleting services..."
      - "{{.KUBECTL}} delete -f manifests/services/ || true"
      - "{{.KUBECTL}} delete -f manifests/ingress/ || true"

  delete-middlewares:
    desc: Delete all middleware Helm releases
    cmds:
      - echo "Deleting middleware Helm releases..."
      - "{{.HELM}} uninstall nacos -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall redis -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall mongodb -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall mysql -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall minio -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall qdrant -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall neo4j -n {{.NAMESPACE}} || true"
      - "{{.HELM}} uninstall higress -n {{.NAMESPACE}} || true"

  cleanup:
    desc: Delete all resources including namespace
    prompt: This will delete ALL resources in namespace {{.NAMESPACE}}. Continue?
    cmds:
      - task: delete-services
      - task: delete-middlewares
      - echo "Deleting namespace..."
      - "{{.KUBECTL}} delete namespace {{.NAMESPACE}} || true"
      - echo "Cleanup complete"

  # =============================================================================
  # Port Forwarding (for local access)
  # =============================================================================

  port-forward:
    desc: Port forward to a service (use SERVICE=name PORT=local:remote)
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
      PORT: '{{.PORT | default "8080:8080"}}'
    cmds:
      - |
        if [ -z "{{.SERVICE}}" ]; then
          echo "Please specify SERVICE=service-name and optionally PORT=local:remote"
          echo "Example: task port-forward SERVICE=nacos PORT=8848:8848"
          exit 1
        fi
      - "{{.KUBECTL}} port-forward -n {{.NAMESPACE}} svc/{{.SERVICE}} {{.PORT}}"
