# Higress Helm Chart Values
# Chart: higress.io/higress

global:
  # Installation mode: local or cloud
  local: true
  
  # Image configuration
  registry: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress
  tag: latest

# Higress Controller
higress-controller:
  replicaCount: 1
  
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Higress Gateway
higress-gateway:
  replicaCount: 1
  
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP
      - name: https
        port: 8443
        targetPort: 8443
        protocol: TCP
  
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# Higress Console
higress-console:
  replicaCount: 1
  
  service:
    type: ClusterIP
    port: 8080
  
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Override naming
nameOverride: "higress"
fullnameOverride: "higress"
