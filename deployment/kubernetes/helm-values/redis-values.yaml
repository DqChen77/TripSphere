# Redis Helm Chart Values
# Chart: bitnami/redis

# Architecture
architecture: standalone  # standalone or replication

# Authentication
auth:
  enabled: false  # Set to true for production and configure password
  password: ""

# Master configuration
master:
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  service:
    type: ClusterIP
    port: 6379

# Replica configuration (if using replication)
replica:
  replicaCount: 0  # Set to 2-3 for production

# Redis configuration
commonConfiguration: |-
  # Enable AOF persistence
  appendonly yes
  # Disable RDB persistence for performance
  save ""

# Health checks
master:
  livenessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5

# Override naming
fullnameOverride: "redis"
