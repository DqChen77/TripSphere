# Nacos Helm Chart Values
# Chart: nacos/nacos

global:
  mode: standalone  # standalone for dev, cluster for production

nacos:
  replicaCount: 1
  
  image:
    repository: nacos/nacos-server
    tag: v3.1.1
    pullPolicy: IfNotPresent
  
  # Nacos service configuration
  service:
    type: ClusterIP
    port: 8848
    nodePort: ""
  
  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  
  # Nacos configuration
  env:
    - name: PREFER_HOST_MODE
      value: "hostname"
    - name: MODE
      value: "standalone"
    - name: NACOS_AUTH_IDENTITY_KEY
      value: "serverIdentity"
    - name: NACOS_AUTH_IDENTITY_VALUE
      value: "security"
    - name: NACOS_AUTH_TOKEN
      value: "VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg="
  
  # Health check
  health:
    enabled: true
  
  # Persistence
  persistence:
    enabled: false  # Use external DB for production

# Override the full name
fullnameOverride: "nacos"
