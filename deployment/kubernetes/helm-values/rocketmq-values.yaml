# RocketMQ Helm Chart Values
# Note: RocketMQ doesn't have a mature official Helm chart
# This file documents the values if using community charts or operator

# Alternative: Deploy using kubectl manifests (see manifests/middlewares/rocketmq.yaml)

# NameServer configuration
nameserver:
  replicaCount: 1
  image:
    repository: apache/rocketmq
    tag: 5.3.2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 9876

# Broker configuration
broker:
  replicaCount: 1
  image:
    repository: apache/rocketmq
    tag: 5.3.2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  service:
    type: ClusterIP
    ports:
      vip: 10909
      main: 10911
      ha: 10912
  persistence:
    enabled: true
    size: 20Gi

# Proxy configuration
proxy:
  replicaCount: 1
  image:
    repository: apache/rocketmq
    tag: 5.3.2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  service:
    type: ClusterIP
    ports:
      main: 8080
      grpc: 8081

# Dashboard (optional)
dashboard:
  enabled: true
  image:
    repository: apacherocketmq/rocketmq-dashboard
    tag: latest
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
