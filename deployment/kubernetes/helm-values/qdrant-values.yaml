# Qdrant Helm Chart Values
# Chart: qdrant/qdrant

# Replica count
replicaCount: 1

# Image configuration
image:
  repository: qdrant/qdrant
  tag: v1.16
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  ports:
    http: 6333
    grpc: 6334
    p2p: 6335

# Persistence
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# Resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Qdrant configuration
config:
  log_level: INFO
  service:
    http_port: 6333
    grpc_port: 6334
  storage:
    storage_path: /qdrant/storage
    snapshots_path: /qdrant/snapshots
    on_disk_payload: true
    wal:
      wal_capacity_mb: 32
      wal_segments_ahead: 0

# Health checks
livenessProbe:
  httpGet:
    path: /
    port: 6333
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 6333
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Override naming
fullnameOverride: "qdrant"
