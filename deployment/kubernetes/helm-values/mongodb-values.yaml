# MongoDB Helm Chart Values
# Chart: bitnami/mongodb

# Architecture
architecture: standalone  # standalone or replicaset
replicaCount: 1  # Change to 3 for production

# Authentication
auth:
  enabled: true
  rootUser: root
  rootPassword: fudanse
  # Databases will be created by applications
  databases: []

# Persistence
persistence:
  enabled: true
  size: 20Gi
  storageClass: ""  # Use default StorageClass
  accessModes:
    - ReadWriteOnce

# Resources
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Service configuration
service:
  type: ClusterIP
  port: 27017

# Readiness and liveness probes
readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 5

# Override the full name to match docker-compose service name
fullnameOverride: "mongodb"
