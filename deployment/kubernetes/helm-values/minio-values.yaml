# MinIO Helm Chart Values
# Chart: minio/minio

# Mode: standalone or distributed
mode: standalone

# Number of drives (for distributed mode)
drivesPerNode: 1

# Number of MinIO containers (for distributed mode)
replicas: 1

# Persistence
persistence:
  enabled: true
  size: 50Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Credentials
rootUser: minioadmin
rootPassword: minioadmin

# Service configuration
service:
  type: ClusterIP
  port: 9000

# Console service
consoleService:
  type: ClusterIP
  port: 9001

# Resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Health checks
livenessProbe:
  httpGet:
    path: /minio/health/live
    port: 9000
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 20
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /minio/health/ready
    port: 9000
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

# Buckets to create on startup
buckets:
  - name: tripsphere-files
    policy: none
    purge: false
  - name: tripsphere-reviews
    policy: none
    purge: false

# Environment variables
environment:
  MINIO_BROWSER: "on"

# Override naming
fullnameOverride: "minio"
