# Neo4j Helm Chart Values
# Chart: neo4j/neo4j

# Neo4j edition (community or enterprise)
neo4j:
  name: neo4j
  edition: "community"
  acceptLicenseAgreement: "yes"
  
  # Password configuration
  password: "fudanse@fudan.edu.cn"
  
  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# Volumes
volumes:
  data:
    mode: defaultStorageClass
    defaultStorageClass:
      size: 10Gi
  
  logs:
    mode: defaultStorageClass
    defaultStorageClass:
      size: 1Gi

# Services
services:
  neo4j:
    enabled: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 7474
      bolt:
        enabled: true
        port: 7687

# Configuration
config:
  dbms.connector.bolt.listen_address: "0.0.0.0:7687"
  dbms.connector.http.listen_address: "0.0.0.0:7474"
  dbms.security.procedures.unrestricted: "gds.*"
  dbms.security.procedures.allowlist: "gds.*"
  # Enable Graph Data Science plugin
  dbms.security.allow_csv_import_from_file_urls: "true"

# Plugins - Graph Data Science
env:
  NEO4J_PLUGINS: '["graph-data-science"]'

# Override naming
fullnameOverride: "neo4j"
