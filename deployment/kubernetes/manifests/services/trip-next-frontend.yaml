---
apiVersion: v1
kind: Service
metadata:
  name: trip-next-frontend
  namespace: tripsphere
  labels:
    app: trip-next-frontend
spec:
  selector:
    app: trip-next-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-next-frontend
  namespace: tripsphere
  labels:
    app: trip-next-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-next-frontend
  template:
    metadata:
      labels:
        app: trip-next-frontend
    spec:
      initContainers:
        - name: wait-for-chat-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z trip-chat-service.tripsphere.svc.cluster.local 24210; do
                echo "Waiting for Chat Service..."
                sleep 5
              done
              echo "Chat Service is ready!"
        - name: wait-for-itinerary-planner
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z trip-itinerary-planner.tripsphere.svc.cluster.local 24215; do
                echo "Waiting for Itinerary Planner..."
                sleep 5
              done
              echo "Itinerary Planner is ready!"
      containers:
        - name: trip-next-frontend
          image: tripsphere/trip-next-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NODE_ENV
            - name: GRPC_ATTRACTION_URL
              value: "trip-attraction-service.tripsphere.svc.cluster.local:50053"
            - name: HTTP_CHAT_URL
              value: "http://trip-chat-service.tripsphere.svc.cluster.local:24210"
            - name: HTTP_ITINERARY_PLANNER_URL
              value: "http://trip-itinerary-planner.tripsphere.svc.cluster.local:24215"
            - name: GRPC_REVIEW_URL
              value: "trip-review-service.tripsphere.svc.cluster.local:50057"
            - name: GRPC_USER_URL
              value: "trip-user-service.tripsphere.svc.cluster.local:50056"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
