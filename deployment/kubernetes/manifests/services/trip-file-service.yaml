---
apiVersion: v1
kind: Service
metadata:
  name: trip-file-service
  namespace: tripsphere
  labels:
    app: trip-file-service
spec:
  selector:
    app: trip-file-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-file-service
  namespace: tripsphere
  labels:
    app: trip-file-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-file-service
  template:
    metadata:
      labels:
        app: trip-file-service
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio.tripsphere.svc.cluster.local 9000; do
                echo "Waiting for MinIO..."
                sleep 5
              done
              echo "MinIO is ready!"
      containers:
        - name: trip-file-service
          image: tripsphere/trip-file-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: APP_ENV
            - name: APP_NAME
              value: "trip-file-service"
            - name: PORT
              value: "50051"
            - name: NACOS_HOST
              value: "nacos.tripsphere.svc.cluster.local"
            - name: NACOS_PORT
              value: "8848"
            - name: NACOS_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_NAMESPACE
            - name: NACOS_GROUP
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_GROUP
            - name: NACOS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NACOS_USERNAME
            - name: NACOS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NACOS_PASSWORD
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MINIO_SECRET_KEY
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
