---
apiVersion: v1
kind: Service
metadata:
  name: trip-review-service
  namespace: tripsphere
  labels:
    app: trip-review-service
spec:
  selector:
    app: trip-review-service
  ports:
    - name: grpc
      port: 50057
      targetPort: 50057
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-review-service
  namespace: tripsphere
  labels:
    app: trip-review-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-review-service
  template:
    metadata:
      labels:
        app: trip-review-service
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql.tripsphere.svc.cluster.local 3306; do
                echo "Waiting for MySQL..."
                sleep 5
              done
              echo "MySQL is ready!"
      containers:
        - name: trip-review-service
          image: tripsphere/trip-review-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50057
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: APP_ENV
            - name: APP_NAME
              value: "trip-review-service"
            - name: PORT
              value: "50057"
            - name: NACOS_HOST
              value: "nacos.tripsphere.svc.cluster.local"
            - name: NACOS_PORT
              value: "8848"
            - name: NACOS_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_NAMESPACE
            - name: NACOS_GROUP
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_GROUP
            - name: NACOS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NACOS_USERNAME
            - name: NACOS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NACOS_PASSWORD
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_DATABASE
            - name: MYSQL_MAX_OPEN_CONN
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_MAX_OPEN_CONN
            - name: MYSQL_MAX_IDLE_CONN
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_MAX_IDLE_CONN
            - name: MYSQL_CONN_MAX_LIFETIME
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MYSQL_CONN_MAX_LIFETIME
            - name: ROCKETMQ_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: ROCKETMQ_ENDPOINT
          livenessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
