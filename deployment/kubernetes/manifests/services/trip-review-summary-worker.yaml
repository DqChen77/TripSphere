---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-review-summary-worker
  namespace: tripsphere
  labels:
    app: trip-review-summary-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-review-summary-worker
  template:
    metadata:
      labels:
        app: trip-review-summary-worker
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-master.tripsphere.svc.cluster.local 6379; do
                echo "Waiting for Redis..."
                sleep 5
              done
              echo "Redis is ready!"
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio.tripsphere.svc.cluster.local 9000; do
                echo "Waiting for MinIO..."
                sleep 5
              done
              echo "MinIO is ready!"
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z qdrant.tripsphere.svc.cluster.local 6333; do
                echo "Waiting for Qdrant..."
                sleep 5
              done
              echo "Qdrant is ready!"
        - name: wait-for-neo4j
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z neo4j.tripsphere.svc.cluster.local 7687; do
                echo "Waiting for Neo4j..."
                sleep 5
              done
              echo "Neo4j is ready!"
      containers:
        - name: trip-review-summary-worker
          image: tripsphere/trip-review-summary:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - review_summary.celery.app
            - worker
            - --loglevel=info
            - --concurrency=4
          env:
            - name: OTEL_SERVICE_NAME
              value: "trip-review-summary-worker"
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: QDRANT_URL
            - name: NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NEO4J_URI
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NEO4J_PASSWORD
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: CELERY_RESULT_BACKEND
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: MINIO_SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: OPENAI_BASE_URL
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
