---
apiVersion: v1
kind: Service
metadata:
  name: trip-user-service
  namespace: tripsphere
  labels:
    app: trip-user-service
spec:
  selector:
    app: trip-user-service
  ports:
    - name: grpc
      port: 50056
      targetPort: 50056
      protocol: TCP
    - name: http
      port: 24217
      targetPort: 24217
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-user-service
  namespace: tripsphere
  labels:
    app: trip-user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-user-service
  template:
    metadata:
      labels:
        app: trip-user-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql.tripsphere.svc.cluster.local 3306; do
                echo "Waiting for MySQL..."
                sleep 5
              done
              echo "MySQL is ready!"
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
      containers:
        - name: trip-user-service
          image: tripsphere/trip-user-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50056
              protocol: TCP
            - name: http
              containerPort: 24217
              protocol: TCP
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_CLOUD_NACOS_SERVER_ADDR
              value: "nacos.tripsphere.svc.cluster.local:8848"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 24217
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 24217
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
