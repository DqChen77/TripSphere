---
apiVersion: v1
kind: Service
metadata:
  name: trip-attraction-service
  namespace: tripsphere
  labels:
    app: trip-attraction-service
spec:
  selector:
    app: trip-attraction-service
  ports:
    - name: http
      port: 24213
      targetPort: 24213
      protocol: TCP
    - name: grpc
      port: 50053
      targetPort: 50053
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-attraction-service
  namespace: tripsphere
  labels:
    app: trip-attraction-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-attraction-service
  template:
    metadata:
      labels:
        app: trip-attraction-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb.tripsphere.svc.cluster.local 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is ready!"
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
      containers:
        - name: trip-attraction-service
          image: tripsphere/trip-attraction-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 24213
              protocol: TCP
            - name: grpc
              containerPort: 50053
              protocol: TCP
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://root:fudanse@mongodb.tripsphere.svc.cluster.local:27017"
            - name: SPRING_DATA_MONGODB_DATABASE
              value: "attraction_db"
            - name: SPRING_CLOUD_NACOS_SERVER_ADDR
              value: "nacos.tripsphere.svc.cluster.local:8848"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 24213
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 24213
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
