---
apiVersion: v1
kind: Service
metadata:
  name: trip-itinerary-service
  namespace: tripsphere
  labels:
    app: trip-itinerary-service
spec:
  selector:
    app: trip-itinerary-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-itinerary-service
  namespace: tripsphere
  labels:
    app: trip-itinerary-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-itinerary-service
  template:
    metadata:
      labels:
        app: trip-itinerary-service
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb.tripsphere.svc.cluster.local 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is ready!"
      containers:
        - name: trip-itinerary-service
          image: tripsphere/trip-itinerary-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50052
              protocol: TCP
          env:
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MONGO_URI
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 40
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
