---
apiVersion: v1
kind: Service
metadata:
  name: trip-itinerary-planner
  namespace: tripsphere
  labels:
    app: trip-itinerary-planner
spec:
  selector:
    app: trip-itinerary-planner
  ports:
    - name: http
      port: 24215
      targetPort: 24215
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-itinerary-planner
  namespace: tripsphere
  labels:
    app: trip-itinerary-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-itinerary-planner
  template:
    metadata:
      labels:
        app: trip-itinerary-planner
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
      containers:
        - name: trip-itinerary-planner
          image: tripsphere/trip-itinerary-planner:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 24215
              protocol: TCP
          env:
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: OPENAI_BASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 24215
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 24215
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
