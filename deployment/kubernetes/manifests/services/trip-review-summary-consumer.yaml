---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-review-summary-consumer
  namespace: tripsphere
  labels:
    app: trip-review-summary-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-review-summary-consumer
  template:
    metadata:
      labels:
        app: trip-review-summary-consumer
    spec:
      initContainers:
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z qdrant.tripsphere.svc.cluster.local 6333; do
                echo "Waiting for Qdrant..."
                sleep 5
              done
              echo "Qdrant is ready!"
      containers:
        - name: trip-review-summary-consumer
          image: tripsphere/trip-review-summary:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - review_summary.rocketmq
          env:
            - name: OTEL_SERVICE_NAME
              value: "trip-review-summary-consumer"
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: QDRANT_URL
            - name: ROCKETMQ_ENDPOINTS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: ROCKETMQ_ENDPOINTS
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: OPENAI_BASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
