---
apiVersion: v1
kind: Service
metadata:
  name: trip-chat-service
  namespace: tripsphere
  labels:
    app: trip-chat-service
spec:
  selector:
    app: trip-chat-service
  ports:
    - name: http
      port: 24210
      targetPort: 24210
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-chat-service
  namespace: tripsphere
  labels:
    app: trip-chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-chat-service
  template:
    metadata:
      labels:
        app: trip-chat-service
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb.tripsphere.svc.cluster.local 27017; do
                echo "Waiting for MongoDB..."
                sleep 5
              done
              echo "MongoDB is ready!"
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z qdrant.tripsphere.svc.cluster.local 6333; do
                echo "Waiting for Qdrant..."
                sleep 5
              done
              echo "Qdrant is ready!"
      containers:
        - name: trip-chat-service
          image: tripsphere/trip-chat-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 24210
              protocol: TCP
          env:
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: QDRANT_URL
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: MONGO_URI
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: OPENAI_BASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 24210
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 24210
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
