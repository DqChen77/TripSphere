---
apiVersion: v1
kind: Service
metadata:
  name: trip-review-summary
  namespace: tripsphere
  labels:
    app: trip-review-summary
spec:
  selector:
    app: trip-review-summary
  ports:
    - name: http
      port: 24212
      targetPort: 24212
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-review-summary
  namespace: tripsphere
  labels:
    app: trip-review-summary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-review-summary
  template:
    metadata:
      labels:
        app: trip-review-summary
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
        - name: wait-for-neo4j
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z neo4j.tripsphere.svc.cluster.local 7687; do
                echo "Waiting for Neo4j..."
                sleep 5
              done
              echo "Neo4j is ready!"
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z qdrant.tripsphere.svc.cluster.local 6333; do
                echo "Waiting for Qdrant..."
                sleep 5
              done
              echo "Qdrant is ready!"
      containers:
        - name: trip-review-summary
          image: tripsphere/trip-review-summary:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 24212
              protocol: TCP
          command:
            - uvicorn
            - review_summary.asgi:app
            - --host
            - "0.0.0.0"
            - --port
            - "24212"
          env:
            - name: NACOS_SERVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NACOS_SERVER_ADDRESS
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: QDRANT_URL
            - name: NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: NEO4J_URI
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: NEO4J_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tripsphere-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: tripsphere-config
                  key: OPENAI_BASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 24212
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 24212
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
