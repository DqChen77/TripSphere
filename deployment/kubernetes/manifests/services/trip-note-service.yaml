---
apiVersion: v1
kind: Service
metadata:
  name: trip-note-service
  namespace: tripsphere
  labels:
    app: trip-note-service
spec:
  selector:
    app: trip-note-service
  ports:
    - name: http
      port: 24216
      targetPort: 24216
      protocol: TCP
    - name: grpc
      port: 50055
      targetPort: 50055
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-note-service
  namespace: tripsphere
  labels:
    app: trip-note-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trip-note-service
  template:
    metadata:
      labels:
        app: trip-note-service
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nacos.tripsphere.svc.cluster.local 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
              echo "Nacos is ready!"
      containers:
        - name: trip-note-service
          image: tripsphere/trip-note-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 24216
              protocol: TCP
            - name: grpc
              containerPort: 50055
              protocol: TCP
          env:
            - name: SPRING_CLOUD_NACOS_SERVER_ADDR
              value: "nacos.tripsphere.svc.cluster.local:8848"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 24216
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 24216
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
