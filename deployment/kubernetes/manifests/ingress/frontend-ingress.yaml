---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripsphere-frontend
  namespace: tripsphere
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # If using cert-manager for TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx  # Change to your ingress class (nginx, traefik, etc.)
  rules:
    - host: tripsphere.local  # Change to your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trip-next-frontend
                port:
                  number: 3000
  # Uncomment for TLS/HTTPS
  # tls:
  #   - hosts:
  #       - tripsphere.local
  #     secretName: tripsphere-tls

---
