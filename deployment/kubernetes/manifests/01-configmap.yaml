---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tripsphere-config
  namespace: tripsphere
data:
  # Nacos Configuration
  NACOS_SERVER_ADDRESS: "nacos.tripsphere.svc.cluster.local:8848"
  
  # Database Configuration
  MONGO_URI: "mongodb://root:fudanse@mongodb.tripsphere.svc.cluster.local:27017"
  MYSQL_HOST: "mysql.tripsphere.svc.cluster.local"
  MYSQL_PORT: "3306"
  MYSQL_MAX_OPEN_CONN: "100"
  MYSQL_MAX_IDLE_CONN: "10"
  MYSQL_CONN_MAX_LIFETIME: "1h"
  
  # MongoDB Databases
  SPRING_DATA_MONGODB_URI: "mongodb://root:fudanse@mongodb.tripsphere.svc.cluster.local:27017"
  
  # Redis Configuration
  REDIS_HOST: "redis-master.tripsphere.svc.cluster.local"
  REDIS_PORT: "6379"
  CELERY_BROKER_URL: "redis://redis-master.tripsphere.svc.cluster.local:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-master.tripsphere.svc.cluster.local:6379/0"
  
  # MinIO Configuration
  MINIO_ENDPOINT: "minio.tripsphere.svc.cluster.local:9000"
  
  # Qdrant Configuration
  QDRANT_URL: "http://qdrant.tripsphere.svc.cluster.local:6333"
  
  # Neo4j Configuration
  NEO4J_URI: "neo4j://neo4j.tripsphere.svc.cluster.local:7687"
  
  # RocketMQ Configuration
  ROCKETMQ_ENDPOINTS: "rocketmq-proxy.tripsphere.svc.cluster.local:8081"
  ROCKETMQ_ENDPOINT: "rocketmq-proxy.tripsphere.svc.cluster.local:8081"
  
  # Higress Configuration
  OPENAI_BASE_URL: "http://higress.tripsphere.svc.cluster.local:8080/v1"
  
  # Service Discovery (Nacos)
  NACOS_HOST: "nacos.tripsphere.svc.cluster.local"
  NACOS_PORT: "8848"
  NACOS_NAMESPACE: "public"
  NACOS_GROUP: "DEFAULT_GROUP"
  
  # Spring Cloud Configuration
  SPRING_CLOUD_NACOS_SERVER_ADDR: "nacos.tripsphere.svc.cluster.local:8848"
  
  # Environment
  APP_ENV: "production"
  NODE_ENV: "production"
