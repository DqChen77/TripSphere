receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  filter/chat_db_find_noise:
    error_mode: ignore
    traces:
      span:
        - 'name == "chat_db.find"'
        - 'attributes["db.system"] == "mongodb" and (attributes["db.operation"] == "find" or attributes["db.operation.name"] == "find") and (attributes["db.name"] == "chat_db" or attributes["db.namespace"] == "chat_db")'
  filter/itinerary_asgi_event_noise:
    error_mode: ignore
    traces:
      span:
        - 'resource.attributes["service.name"] == "trip-itinerary-planner" and attributes["asgi.event.type"] == "http.request"'
        - 'resource.attributes["service.name"] == "trip-itinerary-planner" and attributes["asgi.event.type"] == "http.response.start"'
        - 'resource.attributes["service.name"] == "trip-itinerary-planner" and attributes["asgi.event.type"] == "http.response.body"'
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Export traces to Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel-collector

  # Keep debug exporter for troubleshooting
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/chat_db_find_noise, filter/itinerary_asgi_event_noise, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]