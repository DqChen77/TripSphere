syntax = "proto3";

package tripsphere.review.v1;

import "google/protobuf/timestamp.proto";

option go_package = "tripsphere/review/v1";
option java_multiple_files = true;
option java_package = "org.tripsphere.review.v1";

service ReviewService {
  rpc CreateReview(CreateReviewRequest) returns (CreateReviewResponse);

  rpc UpdateReview(UpdateReviewRequest) returns (UpdateReviewResponse);

  rpc DeleteReview(DeleteReviewRequest) returns (DeleteReviewResponse);

  rpc ListReviewsByEntity(ListReviewsByEntityRequest) returns (ListReviewsByEntityResponse);
}

enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0;
  ENTITY_TYPE_HOTEL = 1;
  ENTITY_TYPE_ATTRACTION = 2;
}

message Review {
  string id = 1;
  string user_id = 2;
  EntityType entity_type = 3;
  string entity_id = 4;
  // A score between 1 and 10
  int32 rating = 5;
  string content = 6;
  repeated string images = 7;
  // Optional extended dimensions.
  // For example: {"view": 4, "fun": 3, "value": 5}
  map<string, uint32> dimensions = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateReviewRequest {
  Review review = 1;
}

message CreateReviewResponse {
  Review review = 1;
}

message UpdateReviewRequest {
  Review review = 1;
}

message UpdateReviewResponse {
  Review review = 1;
}

message DeleteReviewRequest {
  string id = 1;
}

message DeleteReviewResponse {}

message ListReviewsByEntityRequest {
  EntityType entity_type = 1;
  string entity_id = 2;
  int32 page_size = 3;
  // A page token, received from a previous `ListReviewsByEntity` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 4;
  // Reference https://google.aip.dev/132#ordering
  // For example: "created_at" to sort by created_at ascending.
  // If not provided, default to "updated_at desc", which means the latest reviews are first.
  string order_by = 5;
}

message ListReviewsByEntityResponse {
  repeated Review reviews = 1;
  string next_page_token = 2;
  // The current user's review for the entity.
  // If the user has not reviewed the entity, this will not be set.
  Review user_review = 3;
}